<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Wedding Seating Lookup</title>
    <style>
        body {
            font-family: Georgia, serif;
             background: linear-gradient(
                to bottom,
                #f8f4ef,
                #ffffff
            );
            color: #333;
            text-align: center;
            padding: 40px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 350px;
            height: 350px;
            background: url("calla-top-1.webp") no-repeat;
            background-size: contain;
            opacity: 0.25;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            bottom: 0;
            right: 0;
            width: 350px;
            height: 350px;
            background: url("calla-bottom-2.png") no-repeat;
            background-size: contain;
            opacity: 0.25;
            pointer-events: none;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,.1);
        }
        h1 {
            color: #8b6f47;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .guest {
            margin-top: 15px;
            padding: 15px;
            background: #f9f7f4;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>Find Your Table</h1>

<input type="text" id="searchBox" placeholder="Enter first or last name">

<div id="results"></div>

<script>
let guests = [];

fetch("guests.csv")
    .then(response => response.text())
    .then(csvText => {
        parseCSV(csvText);
    })
    .catch(error => {
        console.error("Error loading guest list:", error);
    });

function parseCSV(csvText) {
    const lines = csvText.trim().split("\n");

    guests = [];

    for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(",");

        guests.push({
            firstName: cols[0].trim(),
            lastName: cols[1].trim(),
            tableNumber: cols[2].trim()
        });
    }

    console.log(`${guests.length} guests loaded.`);
}

document.getElementById("searchBox").addEventListener("input", function() {
    const search = this.value.toLowerCase().trim();

    const resultsDiv = document.getElementById("results");

    if (!search) {
        resultsDiv.innerHTML = "";
        return;
    }

    const matches = guests.filter(g =>
        g.firstName.toLowerCase().includes(search) ||
        g.lastName.toLowerCase().includes(search)
    );

    if (matches.length === 0) {
        resultsDiv.innerHTML = "<p>No guest found.</p>";
        return;
    }

    resultsDiv.innerHTML = matches.map(g => `
        <div class="guest">
            <strong>${g.firstName} ${g.lastName}</strong><br>
            Table: ${g.tableNumber}
        </div>
    `).join("");
});
</script>

</body>
</html>
